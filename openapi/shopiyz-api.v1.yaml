  /downloads/digital/{token}:
    get:
      tags: [Digital Downloads]
      summary: Download a digital file by secure token
      operationId: downloadDigitalFile
      servers:
        - url: https://{store}.shopiyz.com
          variables:
            store:
              default: development
      security: []
      parameters:
        - name: token
          in: path
          required: true
          schema: { type: string }
        - name: Range
          in: header
          required: false
          schema: { type: string, example: bytes=0-1048575 }
      responses:
        "200":
          description: Full file response.
        "206":
          description: Partial file response for Range requests.
        "403":
          description: Link disabled or file metadata mismatch.
        "410":
          description: Link expired or download limit reached.
    head:
      tags: [Digital Downloads]
      summary: Retrieve digital file headers by secure token
      operationId: headDigitalFile
      servers:
        - url: https://{store}.shopiyz.com
          variables:
            store:
              default: development
      security: []
      parameters:
        - name: token
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: File headers.
        "206":
          description: Partial file headers.

                  ok: { type: boolean }
components:
  securitySchemes:
    shopiyzAccessToken:
      type: apiKey
      in: header
      name: X-Shopiyz-Access-Token
    bearerAuth:
      type: http
      scheme: bearer
  parameters:
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 250
        default: 50
    Offset:
      name: offset
      in: query
      schema:
        type: integer
        minimum: 0
        default: 0
    Fields:
      name: fields
      in: query
      schema:
        type: string
      description: Comma-separated field list.
    Ids:
      name: ids
      in: query
      schema:
        type: string
      description: Comma-separated IDs.
    ProductId:
      name: product_id
      in: path
      required: true
      schema: { type: string }
    VariantId:
      name: variant_id
      in: path
      required: true
      schema: { type: string }
    ImageId:
      name: image_id
      in: path
      required: true
      schema: { type: string }
    CollectionId:
      name: collection_id
      in: path
      required: true
      schema: { type: string }
  responses:
    CountResponse:
      description: Count response.
      content:
        application/json:
          schema:
            type: object
            properties:
              count:
                type: integer
    EmptyObjectResponse:
      description: Empty object response.
      content:
        application/json:
          schema:
            type: object
  schemas:
    ManagedApp:
      type: object
      properties:
        handle: { type: string }
        name: { type: string }
        description: { type: string }
        state: { type: string, enum: [enabled, disabled, removed, not_installed] }
        installed: { type: boolean }
        enabled: { type: boolean }
        monthly_price_try: { type: number }
        installed_at:
          anyOf:
            - type: string
            - type: "null"
        updated_at:
          anyOf:
            - type: string
            - type: "null"
    ProductTab:
      type: object
      properties:
        id: { type: string }
        label: { type: string }
        source:
          type: string
          enum: [product_description, metafield, static_content, product_faq, reviews, shipping_policy, return_policy]
        enabled: { type: boolean }
        sortOrder: { type: integer }
        content: { type: string }
        assignmentMode:
          type: string
          enum: [all_products, selected_products, collections, tags, vendors]
        targetValues:
          type: array
          items: { type: string }
    ProductFaq:
      type: object
      properties:
        id: { type: string }
        question: { type: string }
        answer: { type: string }
        group: { type: string }
        status: { type: string, enum: [published, draft] }
        source: { type: string, enum: [manual, ai, customer] }
        assignmentMode:
          type: string
          enum: [all_products, selected_products, collections, tags, vendors]
        productIds:
          type: array
          items: { type: string }
        collectionIds:
          type: array
          items: { type: string }
        tags:
          type: array
          items: { type: string }
        vendors:
          type: array
          items: { type: string }
        sortOrder: { type: integer }
    ProductFaqInboxItem:
      type: object
      properties:
        id: { type: string }
        productTitle: { type: string }
        customerName: { type: string }
        customerEmail: { type: string }
        question: { type: string }
        status: { type: string, enum: [pending, answered, hidden] }
        createdAt: { type: string }
    XmlImportProfileInput:
      type: object
      properties:
        id: { type: string, description: Existing profile id. Omit to use the store default profile. }
        title: { type: string }
        supplierName: { type: string }
        warehouseName: { type: string }
        xmlUrl: { type: string, format: uri }
        fetchMode: { type: string, enum: [direct, staticProxy] }
        staticIpEnabled: { type: boolean }
        staticIpAddress: { type: string }
        relayUrl: { type: string }
        authMode: { type: string, enum: [none, basic, bearer, basariApi] }
        authUsername: { type: string }
        authPassword: { type: string, writeOnly: true }
        clearAuthPassword: { type: boolean }
        sourceFiles:
          type: array
          items: { $ref: "#/components/schemas/XmlImportSourceFile" }
        manifestUrl: { type: string }
        priceUrl: { type: string }
        stockUrl: { type: string }
        descriptionUrl: { type: string }
        deltaEnabled: { type: boolean }
        scheduleMode: { type: string, enum: [manual, interval] }
        xsltEnabled: { type: boolean }
        xsltTemplate: { type: string }
        status: { type: string, enum: [active, draft, paused] }
        syncIntervalMinutes: { type: integer, minimum: 5 }
        fieldMappings:
          type: array
          items: { $ref: "#/components/schemas/XmlImportFieldMapping" }
        updatePolicy: { $ref: "#/components/schemas/XmlImportUpdatePolicy" }
        collectionMappings:
          type: array
          items: { $ref: "#/components/schemas/XmlImportValueMapping" }
        vendorMappings:
          type: array
          items: { $ref: "#/components/schemas/XmlImportValueMapping" }
        optionMappings:
          type: array
          items: { $ref: "#/components/schemas/XmlImportValueMapping" }
        attributeMappings:
          type: array
          items: { $ref: "#/components/schemas/XmlImportValueMapping" }
        taxMappings:
          type: array
          items: { $ref: "#/components/schemas/XmlImportValueMapping" }
        metafieldMappings:
          type: array
          items: { $ref: "#/components/schemas/XmlImportMetafieldMapping" }
        marketplaceChannels:
          type: array
          items: { type: string }
        priceRules:
          type: array
          items: { $ref: "#/components/schemas/XmlImportPriceRule" }
    XmlImportSourceFile:
      type: object
      properties:
        id: { type: string }
        title: { type: string }
        kind: { type: string, enum: [full, fullWithDesc, price, stock, description, delta, manifest] }
        url: { type: string }
        enabled: { type: boolean }
        recordCount: { type: integer }
        pageNumber: { type: integer }
        updatedAt: { type: string }
    XmlImportFieldMapping:
      type: object
      properties:
        id: { type: string }
        target:
          type: string
          enum: [sourceId, title, sku, barcode, modelCode, description, price, compareAtPrice, stockQuantity, vendor, categoryPath, imageUrl, taxRate, weight, status]
        sourcePath: { type: string }
        fallback: { type: string }
        required: { type: boolean }
    XmlImportValueMapping:
      type: object
      properties:
        id: { type: string }
        sourceName: { type: string }
        sourceValue: { type: string }
        targetName: { type: string }
        targetValue: { type: string }
        targetId: { type: string }
        autoCreate: { type: boolean }
        updatedAt: { type: string }
    XmlImportMetafieldMapping:
      allOf:
        - $ref: "#/components/schemas/XmlImportValueMapping"
        - type: object
          properties:
            sourcePath: { type: string }
            sampleValue: { type: string }
            namespace: { type: string }
            key: { type: string }
            type: { type: string, example: single_line_text_field }
    XmlImportUpdatePolicy:
      type: object
      properties:
        updateTitle: { type: boolean }
        updateDescription: { type: boolean }
        updateSku: { type: boolean }
        updateBarcode: { type: boolean }
        updatePrices: { type: boolean }
        updateStock: { type: boolean }
        updateVendor: { type: boolean }
        updateCollections: { type: boolean }
        updateAttributes: { type: boolean }
        updateStatus: { type: boolean }
        archiveWhenOutOfStock: { type: boolean }
        archiveWhenPriceMissing: { type: boolean }
        archiveWhenCollectionMissing: { type: boolean }
        archiveWhenImageMissing: { type: boolean }
        archiveWhenMissingFromXml: { type: boolean }
        missingProductAction: { type: string, enum: [none, archive, zeroStock] }
        createMissingCollections: { type: boolean }
        createMissingVendors: { type: boolean }
    XmlImportPriceRule:
      type: object
      properties:
        id: { type: string }
        title: { type: string }
        scope: { type: string, enum: [global, collection, vendor] }
        scopeValue: { type: string }
        scopeTargetId: { type: string }
        targetPrice: { type: string, enum: [price, compareAtPrice, both] }
        minAmount: { type: number }
        maxAmount: { type: number }
        value: { type: number }
        valueType: { type: string, enum: [amount, percentage] }
        direction: { type: string, enum: [increase, decrease] }
        priority: { type: integer }
        enabled: { type: boolean }
        roundTo: { type: string, enum: [none, integer, ending-99, ending-90] }
    XmlImportSummary:
      type: object
      properties:
        detected: { type: integer }
        created: { type: integer }
        updated: { type: integer }
        skipped: { type: integer }
        failed: { type: integer }
        fileSizeBytes: { type: integer }
        collections: { type: integer }
        vendors: { type: integer }
        variants: { type: integer }
        attributes: { type: integer }
        priceRulesApplied: { type: integer }
        notes:
          type: array
          items: { type: string }
    XmlImportProfile:
      allOf:
        - $ref: "#/components/schemas/XmlImportProfileInput"
        - type: object
          properties:
            id: { type: string }
            storeId: { type: string }
            authPasswordPreview: { type: string }
            hasAuthPassword: { type: boolean }
            lastFileSizeBytes: { type: integer }
            lastDetectedCount: { type: integer }
            previousDetectedCount: { type: integer }
            totalRunCount: { type: integer }
            lastRunStatus: { type: string, enum: [idle, running, success, failed] }
            lastRunMessage: { type: string }
            lastRunStartedAt: { type: string }
            lastRunFinishedAt: { type: string }
            nextRunAt: { type: string }
            lastSummary: { type: object, additionalProperties: true }
            createdAt: { type: string }
            updatedAt: { type: string }
    XmlImportRun:
      type: object
      properties:
        id: { type: string }
        profileId: { type: string }
        status: { type: string, enum: [idle, running, success, failed] }
        trigger: { type: string, enum: [manual, scheduled, preview, scan] }
        detectedCount: { type: integer }
        createdCount: { type: integer }
        updatedCount: { type: integer }
        skippedCount: { type: integer }
        failedCount: { type: integer }
        fileSizeBytes: { type: integer }
        message: { type: string }
        summary: { type: object, additionalProperties: true }
        startedAt: { type: string }
        finishedAt: { type: string }
        createdAt: { type: string }
    XmlImportJob:
      type: object
      properties:

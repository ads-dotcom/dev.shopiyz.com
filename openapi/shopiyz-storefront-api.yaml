          required: false
          description: "Mağaza para biriminde minimum fiyat."
          schema: { type: number, minimum: 0 }
        - name: priceMax
          in: query
          required: false
          description: "Mağaza para biriminde maksimum fiyat."
          schema: { type: number, minimum: 0 }

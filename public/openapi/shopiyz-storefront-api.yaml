components:
  securitySchemes:
    StorefrontAccessToken:
      type: apiKey
      in: header
      name: X-Shopiyz-Storefront-Access-Token
    StorefrontBearerAuth:
      type: http
      scheme: bearer
      bearerFormat: shpft
    StorefrontSession:
      type: apiKey
      in: cookie
      name: faprika_session
  schemas:
    StorefrontResponse:
      type: object
      additionalProperties: true
    StorefrontError:
      type: object
      required: [error]
      properties:
        error: { type: string }
  responses:
    BadRequest:
      description: HTTP 400
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StorefrontError'
    Unauthorized:
      description: HTTP 401
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StorefrontError'
    Forbidden:
      description: HTTP 403
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StorefrontError'
    NotFound:
      description: HTTP 404
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StorefrontError'
    RateLimited:
      description: HTTP 429
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StorefrontError'
    InternalError:
      description: HTTP 500
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StorefrontError'

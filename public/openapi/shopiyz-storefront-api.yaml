      operationId: getStorefrontHealth
      summary: "Storefront API health"
      description: "Dağıtılan site Worker'ında Storefront API v1 yönlendirmesinin hazır olduğunu doğrular."
      tags: ["Runtime"]
      x-shopiyz-auth: public
      x-shopiyz-cache: none
      responses:
        '200':
          description: Successful Storefront response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StorefrontResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'
      security: []

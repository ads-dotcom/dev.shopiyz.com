        enabled: { type: boolean }
        sortOrder: { type: integer }
        content: { type: string }
        assignmentMode:
          type: string
          enum: [all_products, selected_products, collections, tags, vendors]
        targetValues:
          type: array
          items: { type: string }
    ProductFaq:
      type: object
      properties:
        id: { type: string }
        question: { type: string }
        answer: { type: string }
        group: { type: string }
        status: { type: string, enum: [published, draft] }
        source: { type: string, enum: [manual, ai, customer] }
        assignmentMode:
          type: string
          enum: [all_products, selected_products, collections, tags, vendors]
        productIds:
          type: array
          items: { type: string }
        collectionIds:
          type: array
          items: { type: string }
        tags:
          type: array
          items: { type: string }
        vendors:
          type: array
          items: { type: string }
        sortOrder: { type: integer }
    ProductFaqInboxItem:

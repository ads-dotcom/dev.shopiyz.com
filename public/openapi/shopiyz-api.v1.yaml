openapi: 3.1.0
info:
  title: Shopiyz Admin REST API
  version: 1.0.0
  summary: Shopiyz Admin REST API reference.
  description: |
    Draft / preview dokumandir. REST v1 ilk yayin kapsamidir; GraphQL daha sonra
    ileri seviye referans olarak degerlendirilecektir.

    Shopiyz Admin REST API mağaza verilerini panel dışındaki güvenli sistemlerden
    okumak ve onaylı işlemlerle yönetmek için kullanılır. Yanıt yapısı Shopify REST
    API'ye yakın tutulur: liste endpointleri `products`, `orders`, `collections`
    gibi root key'lerle döner; detay endpointleri tekil root key kullanır.
servers:
  - url: https://{store}.shopiyz.com/admin/api/{api_version}
    description: Store Admin API
    variables:
      store:
        default: development
        description: Store subdomain or custom store host.
      api_version:
        default: "2026-01"
        enum:
          - v1
          - latest
          - "2026-01"
security:
  - shopiyzAccessToken: []
  - bearerAuth: []
tags:
  - name: Products
  - name: Product Variants
  - name: Product Images
  - name: Collections
  - name: Customers
  - name: Orders
  - name: Apps
  - name: Product Tab Manager
  - name: Product FAQ Studio
paths:
  /products.json:
    get:
      tags: [Products]
      summary: Retrieve a list of products
      operationId: listProducts
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
        - $ref: "#/components/parameters/Fields"
        - $ref: "#/components/parameters/Ids"
        - name: handle
          in: query
          schema: { type: string }
        - name: collection_id
          in: query
          schema: { type: string }
        - name: status
          in: query
          schema: { type: string, enum: [active, draft, archived] }
        - name: vendor
          in: query
          schema: { type: string }
        - name: product_type
          in: query
          schema: { type: string }
        - name: search
          in: query
          schema: { type: string }
        - name: sku
          in: query
          description: Return products by exact variant SKU. Comma-separated values are supported.
          schema: { type: string }
        - name: barcode
          in: query
          description: Return products by exact variant barcode.
          schema: { type: string }
        - name: ean
          in: query
          description: Alias for barcode/EAN lookup.
          schema: { type: string }
        - name: created_at_min
          in: query
          schema: { type: string, format: date-time }
        - name: created_at_max
          in: query
          schema: { type: string, format: date-time }
        - name: updated_at_min
          in: query
          schema: { type: string, format: date-time }
        - name: updated_at_max
          in: query
          schema: { type: string, format: date-time }
      responses:
        "200":
          description: Products list.
          content:
            application/json:
              schema:
                type: object
                properties:
                  products:
                    type: array
                    items: { $ref: "#/components/schemas/Product" }
    post:
      tags: [Products]
      summary: Create a product
      operationId: createProduct
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [product]
              properties:
                product: { $ref: "#/components/schemas/ProductInput" }
      responses:
        "201":
          description: Product created.
          content:
            application/json:
              schema:
                type: object
                properties:
                  product: { $ref: "#/components/schemas/Product" }
  /products/count.json:
    get:
      tags: [Products]
      summary: Count products
      operationId: countProducts
      parameters:
        - name: status
          in: query
          schema: { type: string }
        - name: collection_id
          in: query
          schema: { type: string }
        - name: search
          in: query
          schema: { type: string }
      responses:
        "200": { $ref: "#/components/responses/CountResponse" }
  /products/{product_id}.json:
    get:
      tags: [Products]
      summary: Retrieve a product
      operationId: getProduct
      parameters:
        - $ref: "#/components/parameters/ProductId"
        - $ref: "#/components/parameters/Fields"
      responses:
        "200":
          description: Product detail.
          content:
            application/json:
              schema:
                type: object
                properties:
                  product: { $ref: "#/components/schemas/Product" }
    put:
      tags: [Products]
      summary: Update a product
      operationId: updateProduct
      parameters:
        - $ref: "#/components/parameters/ProductId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [product]
              properties:
                product: { $ref: "#/components/schemas/ProductInput" }
      responses:
        "200":
          description: Product updated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  product: { $ref: "#/components/schemas/Product" }
    delete:
      tags: [Products]
      summary: Delete a product
      operationId: deleteProduct
      parameters:
        - $ref: "#/components/parameters/ProductId"
      responses:
        "200": { $ref: "#/components/responses/EmptyObjectResponse" }
  /products/{product_id}/variants.json:
    get:
      tags: [Product Variants]
      summary: Retrieve product variants
      operationId: listProductVariants
      parameters:
        - $ref: "#/components/parameters/ProductId"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Variants list.
          content:
            application/json:
              schema:
                type: object
                properties:
                  variants:
                    type: array
                    items: { $ref: "#/components/schemas/ProductVariant" }
    post:
      tags: [Product Variants]
      summary: Create a product variant
      operationId: createProductVariant
      parameters:
        - $ref: "#/components/parameters/ProductId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [variant]
              properties:
                variant: { $ref: "#/components/schemas/ProductVariantInput" }
      responses:
        "201":
          description: Variant created.
  /products/{product_id}/variants/count.json:
    get:
      tags: [Product Variants]
      summary: Count product variants
      operationId: countProductVariants
      parameters:
        - $ref: "#/components/parameters/ProductId"
      responses:
        "200": { $ref: "#/components/responses/CountResponse" }
  /variants/{variant_id}.json:
    get:
      tags: [Product Variants]
      summary: Retrieve a variant
      operationId: getProductVariant
      parameters:
        - $ref: "#/components/parameters/VariantId"
      responses:
        "200":
          description: Variant detail.
    put:
      tags: [Product Variants]
      summary: Update a variant
      operationId: updateProductVariant
      parameters:
        - $ref: "#/components/parameters/VariantId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [variant]
              properties:
                variant: { $ref: "#/components/schemas/ProductVariantInput" }
      responses:
        "200":
          description: Variant updated.
    delete:
      tags: [Product Variants]
      summary: Delete a variant
      operationId: deleteProductVariant
      parameters:
        - $ref: "#/components/parameters/VariantId"
      responses:
        "200": { $ref: "#/components/responses/EmptyObjectResponse" }
  /products/{product_id}/images.json:
    get:
      tags: [Product Images]
      summary: Retrieve product images
      operationId: listProductImages
      parameters:
        - $ref: "#/components/parameters/ProductId"
      responses:
        "200":
          description: Images list.
    post:
      tags: [Product Images]
      summary: Create a product image
      operationId: createProductImage
      parameters:
        - $ref: "#/components/parameters/ProductId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [image]
              properties:
                image: { $ref: "#/components/schemas/ProductImageInput" }
      responses:
        "201":
          description: Image created.
  /products/{product_id}/images/count.json:
    get:
      tags: [Product Images]
      summary: Count product images
      operationId: countProductImages
      parameters:
        - $ref: "#/components/parameters/ProductId"
      responses:
        "200": { $ref: "#/components/responses/CountResponse" }
  /products/{product_id}/images/{image_id}.json:
    get:
      tags: [Product Images]
      summary: Retrieve a product image
      operationId: getProductImage
      parameters:
        - $ref: "#/components/parameters/ProductId"
        - $ref: "#/components/parameters/ImageId"
      responses:
        "200":
          description: Image detail.
    put:
      tags: [Product Images]
      summary: Update a product image
      operationId: updateProductImage
      parameters:
        - $ref: "#/components/parameters/ProductId"
        - $ref: "#/components/parameters/ImageId"
      responses:
        "200":
          description: Image updated.
    delete:
      tags: [Product Images]
      summary: Delete a product image
      operationId: deleteProductImage
      parameters:
        - $ref: "#/components/parameters/ProductId"
        - $ref: "#/components/parameters/ImageId"
      responses:
        "200": { $ref: "#/components/responses/EmptyObjectResponse" }
  /collections.json:
    get:
      tags: [Collections]
      summary: Retrieve collections
      operationId: listCollections
      parameters:
        - $ref: "#/components/parameters/Limit"
        - name: search
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Collections list.
  /collections/{collection_id}.json:
    get:
      tags: [Collections]
      summary: Retrieve a collection
      operationId: getCollection
      parameters:
        - $ref: "#/components/parameters/CollectionId"
      responses:
        "200":
          description: Collection detail.
  /collections/{collection_id}/products.json:
    get:
      tags: [Collections, Products]
      summary: Retrieve products in a collection
      operationId: listCollectionProducts
      parameters:
        - $ref: "#/components/parameters/CollectionId"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Products in collection.
  /categories.json:
    get:
      tags: [Collections]
      summary: Retrieve category aliases
      operationId: listCategories
      responses:
        "200":
          description: Category list.
  /custom_collections.json:
    get:
      tags: [Collections]
      summary: Retrieve custom collections
      operationId: listCustomCollections
      responses:
        "200":
          description: Custom collections list.
    post:
      tags: [Collections]
      summary: Create a custom collection
      operationId: createCustomCollection
      responses:
        "201":
          description: Custom collection created.
  /custom_collections/count.json:
    get:
      tags: [Collections]
      summary: Count custom collections
      operationId: countCustomCollections
      responses:
        "200": { $ref: "#/components/responses/CountResponse" }
  /custom_collections/{collection_id}.json:
    get:
      tags: [Collections]
      summary: Retrieve a custom collection
      operationId: getCustomCollection
      parameters:
        - $ref: "#/components/parameters/CollectionId"
      responses:
        "200":
          description: Custom collection detail.
    put:
      tags: [Collections]
      summary: Update a custom collection
      operationId: updateCustomCollection
      parameters:
        - $ref: "#/components/parameters/CollectionId"
      responses:
        "200":
          description: Custom collection updated.
    delete:
      tags: [Collections]
      summary: Delete a custom collection
      operationId: deleteCustomCollection
      parameters:
        - $ref: "#/components/parameters/CollectionId"
      responses:
        "200": { $ref: "#/components/responses/EmptyObjectResponse" }
  /smart_collections.json:
    get:
      tags: [Collections]
      summary: Retrieve smart collections
      operationId: listSmartCollections
      responses:
        "200":
          description: Smart collections list.
    post:
      tags: [Collections]
      summary: Create a smart collection
      operationId: createSmartCollection
      responses:
        "201":
          description: Smart collection created.
  /smart_collections/count.json:
    get:
      tags: [Collections]
      summary: Count smart collections
      operationId: countSmartCollections
      responses:
        "200": { $ref: "#/components/responses/CountResponse" }
  /smart_collections/{collection_id}.json:
    get:
      tags: [Collections]
      summary: Retrieve a smart collection
      operationId: getSmartCollection
      parameters:
        - $ref: "#/components/parameters/CollectionId"
      responses:
        "200":
          description: Smart collection detail.
    put:
      tags: [Collections]
      summary: Update a smart collection
      operationId: updateSmartCollection
      parameters:
        - $ref: "#/components/parameters/CollectionId"
      responses:
        "200":
          description: Smart collection updated.
    delete:
      tags: [Collections]
      summary: Delete a smart collection
      operationId: deleteSmartCollection
      parameters:
        - $ref: "#/components/parameters/CollectionId"
      responses:
        "200": { $ref: "#/components/responses/EmptyObjectResponse" }
  /smart_collections/{collection_id}/order.json:
    put:
      tags: [Collections]
      summary: Reorder products in a smart collection
      operationId: reorderSmartCollection
      parameters:
        - $ref: "#/components/parameters/CollectionId"
      responses:
        "200": { $ref: "#/components/responses/EmptyObjectResponse" }
  /collects.json:
    get:
      tags: [Collections]
      summary: Retrieve product collection assignments
      operationId: listCollects
      responses:
        "200":
          description: Collects list.
    post:
      tags: [Collections]
      summary: Attach a product to a collection
      operationId: createCollect
      responses:
        "201":
          description: Collect created.
  /collects/count.json:
    get:
      tags: [Collections]
      summary: Count collects
      operationId: countCollects
      responses:
        "200": { $ref: "#/components/responses/CountResponse" }
  /collects/{collect_id}.json:
    get:
      tags: [Collections]
      summary: Retrieve a collect
      operationId: getCollect
      parameters:
        - name: collect_id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Collect detail.
    delete:
      tags: [Collections]
      summary: Remove a product from a collection
      operationId: deleteCollect
      parameters:
        - name: collect_id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200": { $ref: "#/components/responses/EmptyObjectResponse" }
  /customers.json:
    get:
      tags: [Customers]
      summary: Retrieve customers
      operationId: listCustomers
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
        - name: search
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Customers list.
          content:
            application/json:
              schema:
                type: object
                properties:
                  customers:
                    type: array
                    items: { $ref: "#/components/schemas/Customer" }
  /orders.json:
    get:
      tags: [Orders]
      summary: Retrieve orders
      operationId: listOrders
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
        - $ref: "#/components/parameters/Fields"
        - $ref: "#/components/parameters/Ids"
        - name: status
          in: query
          schema: { type: string, enum: [open, archived, cancelled, any] }
        - name: financial_status
          in: query
          schema: { type: string }
        - name: fulfillment_status
          in: query
          schema: { type: string }
        - name: customer_id
          in: query
          schema: { type: string }
        - name: email
          in: query
          schema: { type: string }
        - name: search
          in: query
          schema: { type: string }
        - name: created_at_min
          in: query
          schema: { type: string, format: date-time }
        - name: created_at_max
          in: query
          schema: { type: string, format: date-time }
      responses:
        "200":
          description: Orders list.
          content:
            application/json:
              schema:
                type: object
                properties:
                  orders:
                    type: array
                    items: { $ref: "#/components/schemas/Order" }
  /orders/count.json:
    get:
      tags: [Orders]
      summary: Count orders
      operationId: countOrders
      parameters:
        - name: status
          in: query
          schema: { type: string }
        - name: financial_status
          in: query
          schema: { type: string }
        - name: fulfillment_status
          in: query
          schema: { type: string }
      responses:
        "200": { $ref: "#/components/responses/CountResponse" }
  /orders/{order_id}.json:
    get:
      tags: [Orders]
      summary: Retrieve an order
      operationId: getOrder
      parameters:
        - name: order_id
          in: path
          required: true
          schema: { type: string }
        - $ref: "#/components/parameters/Fields"
      responses:
        "200":
          description: Order detail.
          content:
            application/json:
              schema:
                type: object
                properties:
                  order: { $ref: "#/components/schemas/Order" }
  /apps.json:
    get:
      tags: [Apps]
      summary: Retrieve manageable Shopiyz apps
      operationId: listApps
      responses:
        "200":
          description: App list.
          content:
            application/json:
              schema:
                type: object
                properties:
                  apps:
                    type: array
                    items: { $ref: "#/components/schemas/ManagedApp" }
  /apps/{handle}.json:
    get:
      tags: [Apps]
      summary: Retrieve an app state and settings
      operationId: getApp
      parameters:
        - name: handle
          in: path
          required: true
          schema: { type: string, enum: [product-tab-manager, product-faq-studio] }
      responses:
        "200":
          description: App detail.
  /apps/{handle}/settings.json:
    get:
      tags: [Apps]
      summary: Retrieve app settings
      operationId: getAppSettings
      parameters:
        - name: handle
          in: path
          required: true
          schema: { type: string, enum: [product-tab-manager, product-faq-studio] }
      responses:
        "200":
          description: App settings.
    put:
      tags: [Apps]
      summary: Update app settings
      description: Requires the paid app to be installed and enabled. Token scope must include admin:write or apps:write.
      operationId: updateAppSettings
      parameters:
        - name: handle
          in: path
          required: true
          schema: { type: string, enum: [product-tab-manager, product-faq-studio] }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                settings: { type: object }
      responses:
        "200":
          description: Settings updated.
        "409":
          description: App is not installed or enabled.
  /apps/product-tab-manager/tabs.json:
    get:
      tags: [Product Tab Manager]
      summary: Retrieve product tabs
      operationId: listProductTabs
      responses:
        "200":
          description: Product tabs.
    post:
      tags: [Product Tab Manager]
      summary: Create a product tab
      operationId: createProductTab
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tab: { $ref: "#/components/schemas/ProductTab" }
      responses:
        "201":
          description: Product tab created.
        "409":
          description: App is not installed or enabled.
  /apps/product-tab-manager/tabs/{tab_id}.json:
    get:
      tags: [Product Tab Manager]
      summary: Retrieve a product tab
      operationId: getProductTab
      parameters:
        - name: tab_id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Product tab detail.
    put:
      tags: [Product Tab Manager]
      summary: Update a product tab
      operationId: updateProductTab
      parameters:
        - name: tab_id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Product tab updated.
    delete:
      tags: [Product Tab Manager]
      summary: Delete a product tab
      operationId: deleteProductTab
      parameters:
        - name: tab_id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200": { $ref: "#/components/responses/EmptyObjectResponse" }
  /apps/product-tab-manager/tabs/reorder.json:
    post:
      tags: [Product Tab Manager]
      summary: Reorder product tabs
      operationId: reorderProductTabs
      responses:
        "200":
          description: Product tabs reordered.
  /apps/product-faq-studio/faqs.json:
    get:
      tags: [Product FAQ Studio]
      summary: Retrieve product FAQs
      operationId: listProductFaqs
      responses:
        "200":
          description: Product FAQs.
    post:
      tags: [Product FAQ Studio]
      summary: Create a product FAQ
      operationId: createProductFaq
      responses:
        "201":
          description: Product FAQ created.
  /apps/product-faq-studio/faqs/{faq_id}.json:
    get:
      tags: [Product FAQ Studio]
      summary: Retrieve a product FAQ
      operationId: getProductFaq
      parameters:
        - name: faq_id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Product FAQ detail.
    put:
      tags: [Product FAQ Studio]
      summary: Update a product FAQ
      operationId: updateProductFaq
      parameters:
        - name: faq_id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Product FAQ updated.
    delete:
      tags: [Product FAQ Studio]
      summary: Delete a product FAQ
      operationId: deleteProductFaq
      parameters:
        - name: faq_id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200": { $ref: "#/components/responses/EmptyObjectResponse" }
  /apps/product-faq-studio/faqs/reorder.json:
    post:
      tags: [Product FAQ Studio]
      summary: Reorder product FAQs
      operationId: reorderProductFaqs
      responses:
        "200":
          description: Product FAQs reordered.
  /apps/product-faq-studio/inbox.json:
    get:
      tags: [Product FAQ Studio]
      summary: Retrieve product FAQ inbox questions
      operationId: listProductFaqInbox
      responses:
        "200":
          description: Inbox questions.
    post:
      tags: [Product FAQ Studio]
      summary: Create an inbox question
      operationId: createProductFaqInboxItem
      responses:
        "201":
          description: Inbox question created.
  /apps/product-faq-studio/inbox/{inbox_id}.json:
    get:
      tags: [Product FAQ Studio]
      summary: Retrieve an inbox question
      operationId: getProductFaqInboxItem
      parameters:
        - name: inbox_id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Inbox question detail.
    put:
      tags: [Product FAQ Studio]
      summary: Update an inbox question
      operationId: updateProductFaqInboxItem
      parameters:
        - name: inbox_id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Inbox question updated.
    delete:
      tags: [Product FAQ Studio]
      summary: Delete an inbox question
      operationId: deleteProductFaqInboxItem
      parameters:
        - name: inbox_id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200": { $ref: "#/components/responses/EmptyObjectResponse" }
  /apps/product-faq-studio/inbox/{inbox_id}/publish.json:
    post:
      tags: [Product FAQ Studio]
      summary: Publish an inbox question as a FAQ
      operationId: publishProductFaqInboxItem
      parameters:
        - name: inbox_id
          in: path
          required: true
          schema: { type: string }
      responses:
        "201":
          description: FAQ created from inbox question.
components:
  securitySchemes:
    shopiyzAccessToken:
      type: apiKey
      in: header
      name: X-Shopiyz-Access-Token
    bearerAuth:
      type: http
      scheme: bearer
  parameters:
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 250
        default: 50
    Offset:
      name: offset
      in: query
      schema:
        type: integer
        minimum: 0
        default: 0
    Fields:
      name: fields
      in: query
      schema:
        type: string
      description: Comma-separated field list.
    Ids:
      name: ids
      in: query
      schema:
        type: string
      description: Comma-separated IDs.
    ProductId:
      name: product_id
      in: path
      required: true
      schema: { type: string }
    VariantId:
      name: variant_id
      in: path
      required: true
      schema: { type: string }
    ImageId:
      name: image_id
      in: path
      required: true
      schema: { type: string }
    CollectionId:
      name: collection_id
      in: path
      required: true
      schema: { type: string }
  responses:
    CountResponse:
      description: Count response.
      content:
        application/json:
          schema:
            type: object
            properties:
              count:

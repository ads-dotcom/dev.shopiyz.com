      type: object
      properties:
        settings: { $ref: "#/components/schemas/DigitalDownloadsSettings" }
        summary:
          type: object
          properties:
            assetCount: { type: integer }
            activeAssetCount: { type: integer }
            entitlementCount: { type: integer }
            downloadCount: { type: integer }
            emailSentCount: { type: integer }
        products:
          type: array
          items: { $ref: "#/components/schemas/DigitalDownloadProductOption" }
        assets:
          type: array
          items: { $ref: "#/components/schemas/DigitalDownloadAsset" }
        entitlements:
          type: array
          items: { $ref: "#/components/schemas/DigitalDownloadEntitlement" }
    DigitalDownloadUploadRequest:
      type: object
      required: [file, productId]
      properties:
        file: { type: string, format: binary }
        productId: { type: string }
        variantId: { type: string }
        title: { type: string }
        deliveryType: { type: string, enum: [automatic, manual], default: automatic }
        downloadLimit: { type: integer, minimum: 0, default: 0 }
    DigitalDownloadsActionRequest:
      oneOf:
        - type: object
          required: [action, id, status]
          properties:
            action: { type: string, enum: [setAssetStatus] }
            id: { type: string }
            status: { type: string, enum: [active, disabled] }
        - type: object
          required: [action, id]
          properties:
            action: { type: string, enum: [deleteAsset] }
            id: { type: string }
        - type: object
          required: [action, id, status]
          properties:
            action: { type: string, enum: [setEntitlementStatus] }
            id: { type: string }
            status: { type: string, enum: [active, disabled, expired] }
        - type: object
          required: [action, entitlementId]
          properties:
            action: { type: string, enum: [resendEmail, viewLink] }
            entitlementId: { type: string }
        - type: object
          required: [action, orderId, email]
          properties:
            action: { type: string, enum: [updateEmail] }
            orderId: { type: string }
            email: { type: string, format: email }
        - type: object
          required: [action, orderId]
          properties:
            action: { type: string, enum: [syncOrder] }
            orderId: { type: string }
        - type: object
          required: [action, assetId]
          properties:
            action: { type: string, enum: [sendFileUpdate] }
            assetId: { type: string }
    DigitalDownloadsActionResponse:
      allOf:
        - $ref: "#/components/schemas/DigitalDownloadsOverview"
        - type: object
          properties:
            downloadUrl: { type: string, format: uri }
            message: { type: string }

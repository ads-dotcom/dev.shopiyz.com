components:
  securitySchemes:
    shopiyzAccessToken:
      type: apiKey
      in: header
      name: X-Shopiyz-Access-Token
    bearerAuth:
      type: http
      scheme: bearer
  parameters:
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 250
        default: 50
    Offset:
      name: offset
      in: query
      schema:
        type: integer
        minimum: 0
        default: 0
    Fields:
      name: fields
      in: query
      schema:
        type: string
      description: Comma-separated field list.
    Ids:
      name: ids
      in: query
      schema:
        type: string
      description: Comma-separated IDs.
    ProductId:
      name: product_id
      in: path
      required: true
      schema: { type: string }
    VariantId:
      name: variant_id
      in: path
      required: true
      schema: { type: string }
    ImageId:
      name: image_id
      in: path
      required: true
      schema: { type: string }
    CollectionId:
      name: collection_id
      in: path
      required: true
      schema: { type: string }
  responses:

    ApiErrorResponse:
      description: API error response.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
    CountResponse:
      description: Count response.
      content:
        application/json:
          schema:
            type: object
            properties:
              count:
                type: integer
    EmptyObjectResponse:
      description: Empty object response.
      content:
        application/json:
          schema:
            type: object
  schemas:

    ApiError:
      type: object
      properties:
        code: { type: string }
        message: { type: string }
        details: { type: object }
    ApiErrorResponse:
      type: object
      properties:
        error:
          oneOf:
            - type: string
            - $ref: "#/components/schemas/ApiError"
    GenericApiRequest:
      type: object
      additionalProperties: true
    GenericApiResponse:
      type: object
      additionalProperties: true
    Capability:
      type: object
      additionalProperties: true
    CapabilityOperation:
      type: object
      additionalProperties: true
    OperationPlan:
      type: object
      additionalProperties: true
    PlanValidationRequest:
      type: object

    ContactAcceptedResponse:
      type: object
      additionalProperties: false
      required: [accepted, message]
      properties:
        accepted: { type: boolean, const: true }
        message: { type: string }
    StorefrontMeta:
      type: object
      properties:
        apiVersion: { type: string }

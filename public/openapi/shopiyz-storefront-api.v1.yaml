openapi: 3.1.0
info:
  title: Shopiyz Storefront API
  version: "2026-07-22"
  description: |-
    Versioned, read-optimized storefront contract used by Shopiyz themes and headless clients.
    First-party same-origin themes may read public endpoints without a token. Cross-origin clients use a storefront token with storefront:read.
servers:
  - url: https://{store}.myshopiyz.com/api/storefront/v1
    variables:
      store:
        default: development
        description: Store subdomain or custom store hostname.
x-shopiyz-base-path: "/api/storefront/v1"
x-shopiyz-generated-at: "2026-07-23T18:20:14.286Z"
paths:
  /health:
    get:
      operationId: getStorefrontHealth
      summary: "Storefront API health"
      description: "Dağıtılan site Worker'ında Storefront API v1 yönlendirmesinin hazır olduğunu doğrular."
      tags: ["Runtime"]
      x-shopiyz-auth: public
      x-shopiyz-cache: none
      responses:
        '200':
          description: Successful Storefront response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StorefrontResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'
      security: []
  /page:
    get:
      operationId: getStorefrontPage
      summary: "Get page runtime payload"
      description: "Mağaza, yayınlanmış tema, sayfa düzenleri, gerekli katalog verileri, menüler ve sayfaya özel kaynağı tek payload içinde döndürür."
      tags: ["Runtime"]
      x-shopiyz-auth: public_or_storefront_token
      x-shopiyz-cache: edge
      x-required-scopes: ["storefront:read"]
      parameters:
        - name: storeId
          in: query
          required: false
          description: "Yalnız development/preview ortamında açık mağaza kimliği."
          schema: { type: string }
        - name: preview
          in: query
          required: false
          description: "Yetkili aynı-origin oturumunda taslak içerik ön izlemesi."
          schema: { type: boolean }
        - name: previewThemeId
          in: query
          required: false
          description: "Ön izlenecek kurulu tema kimliği."
          schema: { type: string }
        - name: designId
          in: query
          required: false
          description: "Ön izlenecek tema düzeni kimliği."
          schema: { type: string }
        - name: pageType
          in: query
          required: false
          description: "home, product, collection, collection-list, search, page, blog-category veya blog-post."
          schema: { type: string }
        - name: path
          in: query
          required: false
          description: "Tarayıcıdaki kanonik storefront yolu."
          schema: { type: string }
        - name: product
          in: query
          required: false
          description: "Ürün handle veya kimliği."
          schema: { type: string }
        - name: collection
          in: query
          required: false
          description: "Koleksiyon handle veya kimliği."
          schema: { type: string }
        - name: blog
          in: query
          required: false
          description: "Blog handle."
          schema: { type: string }
        - name: blogPost
          in: query
          required: false
          description: "Blog yazısı handle."
          schema: { type: string }
        - name: page
          in: query
          required: false
          description: "İçerik sayfası handle."
          schema: { type: string }
        - name: policy
          in: query
          required: false
          description: "Politika handle."
          schema: { type: string }
        - name: limit
          in: query
          required: false
          description: "Sayfa başına sonuç; en fazla 48."
          schema: { type: integer, minimum: 1, maximum: 48 }
      responses:
        '200':
          description: Successful Storefront response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StorefrontPageResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'
      security:
        - {}
        - StorefrontAccessToken: []
        - StorefrontBearerAuth: []
  /shop:
    get:
      operationId: getStorefrontShop
      summary: "Get shop and theme shell"
      description: "Mağaza kimliği, herkese açık ayarlar, aktif tema ve header/footer düzenlerini döndürür."
      tags: ["Runtime"]
      x-shopiyz-auth: public_or_storefront_token
      x-shopiyz-cache: edge
      x-required-scopes: ["storefront:read"]
      parameters:
        - name: storeId
          in: query
          required: false
          description: "Yalnız development/preview ortamında açık mağaza kimliği."
          schema: { type: string }
        - name: preview
          in: query
          required: false
          description: "Yetkili aynı-origin oturumunda taslak içerik ön izlemesi."
          schema: { type: boolean }
        - name: previewThemeId
          in: query
          required: false
          description: "Ön izlenecek kurulu tema kimliği."
          schema: { type: string }
        - name: designId
          in: query
          required: false
          description: "Ön izlenecek tema düzeni kimliği."
          schema: { type: string }
      responses:
        '200':
          description: Successful Storefront response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShopResponse'
              example:
                settings:
                  socialLinks: []
                  commerceDisplay: { freeShippingThreshold: null, paymentBrands: [] }
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'
      security:
        - {}
        - StorefrontAccessToken: []
        - StorefrontBearerAuth: []
  /localization:
    get:
      operationId: getStorefrontLocalization
      summary: "Get locale, currency and markets"
      description: "Tema fiyat formatı için mağaza para birimini, locale bilgisini, ondalık basamakları ve aktif pazar ülkelerini döndürür."

      required: [store, settings, products, collections, menus, localization, promotions, storefrontRevision]
      properties:
        store: { type: object, additionalProperties: true }
        settings: { type: object, additionalProperties: true }
        activeTheme: { type: [object, 'null'], additionalProperties: true }
        themeLayout: { type: [object, 'null'], additionalProperties: true }
        headerLayout: { type: [object, 'null'], additionalProperties: true }
        footerLayout: { type: [object, 'null'], additionalProperties: true }
        products: { type: array, items: { $ref: '#/components/schemas/Product' } }
        collections: { type: array, items: { $ref: '#/components/schemas/Collection' } }
        menus: { type: array, items: { $ref: '#/components/schemas/Menu' } }
        selectedProduct: { oneOf: [{ $ref: '#/components/schemas/Product' }, { type: 'null' }] }
        selectedCollection: { oneOf: [{ $ref: '#/components/schemas/Collection' }, { type: 'null' }] }
        localization: { $ref: '#/components/schemas/Localization' }
        promotions: { type: array, items: { $ref: '#/components/schemas/Promotion' } }
        storefrontRevision: { type: string }
      additionalProperties: true
    ContentPageResponse:
      allOf:
        - $ref: '#/components/schemas/StorefrontMeta'
        - type: object
          required: [page]
          properties:
            page: { type: object, additionalProperties: true }
    BlogListResponse:
      allOf:
        - $ref: '#/components/schemas/StorefrontMeta'
        - type: object
          required: [blogs]
          properties:
            blogs: { type: array, items: { type: object, additionalProperties: true } }
    BlogResponse:
      allOf:
        - $ref: '#/components/schemas/StorefrontMeta'
        - type: object
          required: [blog, posts]
          properties:
            blog: { type: object, additionalProperties: true }
            posts: { type: array, items: { type: object, additionalProperties: true } }
    BlogPostResponse:
      allOf:
        - $ref: '#/components/schemas/StorefrontMeta'
        - type: object
          required: [blog, post, products]
          properties:
            blog: { type: object, additionalProperties: true }
            post: { type: object, additionalProperties: true }
            products: { type: array, items: { $ref: '#/components/schemas/Product' } }
    SearchResponse:
      allOf:
        - $ref: '#/components/schemas/StorefrontMeta'
        - type: object
          required: [search, products, collections]
          properties:
            search: { type: [object, 'null'], additionalProperties: true }
            products: { type: array, items: { $ref: '#/components/schemas/Product' } }
            collections: { type: array, items: { $ref: '#/components/schemas/Collection' } }
    StorefrontError:
      type: object
      required: [error]
      properties:
        error: { type: string }
  responses:
    BadRequest:
      description: HTTP 400
      content:
        application/json:
          schema:
            oneOf:
              - $ref: '#/components/schemas/StorefrontError'
              - $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: HTTP 401
      content:
        application/json:
          schema:
            oneOf:
              - $ref: '#/components/schemas/StorefrontError'
              - $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: HTTP 403
      content:
        application/json:
          schema:
            oneOf:
              - $ref: '#/components/schemas/StorefrontError'
              - $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: HTTP 404
      content:
        application/json:
          schema:
            oneOf:
              - $ref: '#/components/schemas/StorefrontError'
              - $ref: '#/components/schemas/ErrorResponse'
    MethodNotAllowed:
      description: HTTP 405
      headers:
        Allow:
          required: true
          schema: { type: string }
          description: Bu route için desteklenen HTTP metotları.
      content:
        application/json:
          schema:
            oneOf:
              - $ref: '#/components/schemas/StorefrontError'
              - $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: HTTP 409
      content:
        application/json:
          schema:
            oneOf:
              - $ref: '#/components/schemas/StorefrontError'
              - $ref: '#/components/schemas/ErrorResponse'
    PayloadTooLarge:
      description: HTTP 413
      content:
        application/json:
          schema:
            oneOf:
              - $ref: '#/components/schemas/StorefrontError'
              - $ref: '#/components/schemas/ErrorResponse'
    UnsupportedMediaType:
      description: HTTP 415
      content:
        application/json:
          schema:
            oneOf:
              - $ref: '#/components/schemas/StorefrontError'
              - $ref: '#/components/schemas/ErrorResponse'
    UnprocessableEntity:
      description: HTTP 422
      content:
        application/json:
          schema:
            oneOf:
              - $ref: '#/components/schemas/StorefrontError'
              - $ref: '#/components/schemas/ErrorResponse'
    RateLimited:
      description: HTTP 429
      content:
        application/json:
          schema:
            oneOf:
              - $ref: '#/components/schemas/StorefrontError'
              - $ref: '#/components/schemas/ErrorResponse'
    InternalError:
      description: HTTP 500
      content:
        application/json:
          schema:
            oneOf:
              - $ref: '#/components/schemas/StorefrontError'
              - $ref: '#/components/schemas/ErrorResponse'
    DeliveryFailed:
      description: HTTP 502
      content:
        application/json:
          schema:
            oneOf:
              - $ref: '#/components/schemas/StorefrontError'
              - $ref: '#/components/schemas/ErrorResponse'

        - StorefrontBearerAuth: []
  /products:
    get:
      operationId: listStorefrontProducts
      summary: "List and filter published products"
      description: "Aktif ürünleri fiyat, marka, kategori, ürün tipi, etiket, renk, beden ve stok facetleri; sıralama ve kararlı sayfalama bilgileriyle listeler. Liste yanıtı filtre için kullanılan metafield tanımlarını, include=metafields ise tüm yayınlanabilir tanımları ekler."
      tags: ["Catalog"]
      x-shopiyz-auth: public_or_storefront_token
      x-shopiyz-cache: edge
      x-required-scopes: ["storefront:read"]
      parameters:
        - name: storeId
          in: query
          required: false
          description: "Yalnız development/preview ortamında açık mağaza kimliği."
          schema: { type: string }
        - name: preview
          in: query
          required: false
          description: "Yetkili aynı-origin oturumunda taslak içerik ön izlemesi."
          schema: { type: boolean }
        - name: previewThemeId
          in: query
          required: false
          description: "Ön izlenecek kurulu tema kimliği."
          schema: { type: string }
        - name: designId
          in: query
          required: false
          description: "Ön izlenecek tema düzeni kimliği."
          schema: { type: string }
        - name: page
          in: query
          required: false
          description: "Birden başlayan sonuç sayfası."
          schema: { type: integer, minimum: 1 }
        - name: limit
          in: query
          required: false
          description: "Sayfa başına sonuç; en fazla 48."
          schema: { type: integer, minimum: 1, maximum: 48 }
        - name: sort
          in: query
          required: false
          description: "Katalog sıralaması."
          schema: { type: string, enum: ["default", "title-asc", "title-desc", "newest", "oldest", "price-asc", "price-desc"] }
        - name: vendor
          in: query
          required: false
          description: "Virgülle ayrılmış veya tekrarlanan marka değerleri."
          schema: { type: string }
        - name: productType
          in: query
          required: false
          description: "Virgülle ayrılmış veya tekrarlanan ürün tipi değerleri."
          schema: { type: string }
        - name: category
          in: query
          required: false
          description: "Virgülle ayrılmış veya tekrarlanan kategori değerleri."
          schema: { type: string }
        - name: tag
          in: query
          required: false
          description: "Virgülle ayrılmış veya tekrarlanan etiket değerleri."
          schema: { type: string }
        - name: color
          in: query
          required: false
          description: "Varyant renk seçeneği; Color, Colour, Renk, Farbe ve Couleur adları tanınır."
          schema: { type: string }
        - name: size
          in: query
          required: false
          description: "Varyant beden seçeneği; Size, Beden, Größe ve Taille adları tanınır."
          schema: { type: string }
        - name: availability
          in: query
          required: false
          description: "Satılabilirlik filtresi."
          schema: { type: string, enum: ["in-stock", "out-of-stock", "preorder"] }
        - name: priceMin
          in: query
          required: false
          description: "Mağaza para biriminde minimum fiyat."
          schema: { type: number, minimum: 0 }
        - name: priceMax
          in: query
          required: false
          description: "Mağaza para biriminde maksimum fiyat."
          schema: { type: number, minimum: 0 }
        - name: include
          in: query
          required: false
          description: "Liste ve arama sonuçlarına tüm aktif, Storefront görünür metafield tanımlarını ekler. Varsayılanda yalnız filtre için kullanılan metafield alanları döner."
          schema: { type: string, enum: ["metafields"] }
      responses:
        '200':
          description: Successful Storefront response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductConnectionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'
      security:
        - {}
        - StorefrontAccessToken: []
        - StorefrontBearerAuth: []

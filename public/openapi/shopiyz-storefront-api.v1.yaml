        mediaType: { type: string }
        position: { type: integer }
        width: { type: [integer, 'null'] }
        height: { type: [integer, 'null'] }
        variantIds: { type: array, items: { type: string }, description: Mevcut product_images.variant_ids atamalarından üretilir. }
    Product:
      type: object

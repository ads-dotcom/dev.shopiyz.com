components:
  securitySchemes:
    StorefrontAccessToken:
      type: apiKey
      in: header
      name: X-Shopiyz-Storefront-Access-Token
    StorefrontBearerAuth:
      type: http
      scheme: bearer
      bearerFormat: shpft
    StorefrontSession:
      type: apiKey
      in: cookie
      name: faprika_session
    CustomerOAuthBearer:
      type: http
      scheme: bearer
      bearerFormat: shpcat
  schemas:
    StorefrontResponse:
      type: object
      additionalProperties: true
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code: { type: string }
            message: { type: string }
            details: {}
    CheckoutLineInput:
      type: object
      additionalProperties: false
      required: [variantId, quantity]
      properties:
        variantId: { type: string, minLength: 1 }
        quantity: { type: integer, minimum: 1, maximum: 99 }
    CheckoutSessionRequest:
      type: object
      additionalProperties: false
      required: [lines, returnUrl, cancelUrl]
      properties:
        lines: { type: array, minItems: 1, maxItems: 50, items: { $ref: '#/components/schemas/CheckoutLineInput' } }
        locale: { type: string }
        currency: { type: string, pattern: '^[A-Z]{3}$' }
        returnUrl: { type: string, format: uri }
        cancelUrl: { type: string, format: uri }
    CheckoutSessionResponse:
      type: object
      required: [id, checkoutId, status, checkoutUrl, expiresAt, currency, lines, subtotal, discountTotal, shippingTotal, taxTotal, total, pricing]
      properties:

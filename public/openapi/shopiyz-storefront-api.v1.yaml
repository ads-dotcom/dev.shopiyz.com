        - name: preview
          in: query
          required: false
          description: "Yetkili aynı-origin oturumunda taslak içerik ön izlemesi."
          schema: { type: boolean }
        - name: previewThemeId
          in: query
          required: false
          description: "Ön izlenecek kurulu tema kimliği."
          schema: { type: string }
        - name: designId
          in: query
          required: false
          description: "Ön izlenecek tema düzeni kimliği."
          schema: { type: string }
      responses:
        '200':
